version: '3.8'

services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - worker

  worker:
    build:
      context: .
      target: cron
    env_file:
      - .env
    restart: unless-stopped
